# Render Blueprint — deploys the frontend as a free static site.
#
# Render's free Static Sites are always-on (no cold starts, unlike free Web
# Services) which suits this app: the page must load instantly for a student who
# has just started the local backend .exe.
#
# You can either commit this file and use "New + -> Blueprint", or configure the
# same values by hand in the dashboard (see README/deploy notes).

services:
  - type: web
    name: wmc-virtual-lab
    runtime: static

    # The React app lives in frontend/, not the repo root.
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist

    # Vite reads .env.production at build time (VITE_API_BASE=http://localhost:8000),
    # which is committed, so no dashboard env vars are required.

    routes:
      # SPA fallback: every unmatched path must serve index.html, otherwise a
      # refresh on /practical7 (or any deep link a search engine crawls) 404s.
      # Keep this LAST so real files (assets, robots.txt, sitemap.xml) win first.
      - type: rewrite
        source: /*
        destination: /index.html

    headers:
      # Fingerprinted Vite assets are immutable — cache them hard.
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      # Never let a stale HTML shell pin users to an old JS bundle.
      - path: /index.html
        name: Cache-Control
        value: no-cache
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
